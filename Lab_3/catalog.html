<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог курсов - Coursely</title>
    <link rel="stylesheet" href="./CSS/style.css"> 
    <link rel="stylesheet" href="./CSS/catalog.css"> 
    <script src="./JavaScript/catalog.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    </style>
</head>
<body>
    <header class="header">
        <div class="wrapper--coursely">
            <div class="container--big">
                <div class="header--coursely catalog--header">
                    <a href="index.html" class="header--logo">
                        <img src="./Image/Logo.png" alt="Coursely Logo" class="header--logo--image" width="141" height="27">
                    </a>
                    <h1>КАТАЛОГ КУРСОВ</h1>
                    <button class="catalog--header--button" type="button">
                        <a href="index.html">Вернуться на главную</a>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container--big">
        <section class="controls--section">
            <input type="text" id="searchInput" placeholder="Поиск по названию..." class="control--input">
            
            <input type="number" id="minPrice" placeholder="Мин. цена ($)" class="control--input">
            <input type="number" id="maxPrice" placeholder="Макс. цена ($)" class="control--input">
            
            <select id="categorySelect" class="control--select">
                <option value="All">Все категории</option>
                <option value="Audio">Audio</option>
                <option value="Video">Video</option>
                <option value="Design">Design</option>
                <option value="Marketing">Marketing</option>
            </select>

            <select id="sortSelect" class="control--select">
                <option value="default">Сортировка</option>
                <option value="priceAsc">Сначала дешевле</option>
                <option value="priceDesc">Сначала дороже</option>
                <option value="ratingDesc">Высокий рейтинг</option>
            </select>
        </section>

        <div id="catalog-container" class="catalog--grid">
            </div>

        <div class="pagination--controls" style="display: flex; justify-content: center; align-items: center; gap: 20px; margin: 40px 0;">
            <button id="prevPage" class="catalog--header--button" style="padding: 0 20px;">Назад</button>
            <span id="pageInfo" style="font-weight: bold; font-family: 'Inter', sans-serif;">Страница 1</span>
            <button id="nextPage" class="catalog--header--button" style="padding: 0 20px;">Вперед</button>
        </div>
    </main>
</body>
</html>
