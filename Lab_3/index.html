<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coursely</title>
    <link rel="stylesheet" href="./CSS/styles.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
    </style>
</head>
<body>
    <header class="header">
        <div class="header--templates">
            <p>A Webflow template for video courses.</p>
            <a href="#" class="a--header">See all templates ></a>
        </div>
        
        <div class="wrapper--coursely">
            <div class="container--big">
                <div class="header--coursely">
                    <a href="/" class="header--logo">
                        <img 
                            src="/Image/Logo.png" 
                            alt="Coursely Logo" 
                            class="header--logo--image"
                            width="141" 
                            height="27" 
                            loading="lazy">
                    </a>
                    <h1>LAUNCH A SUCCESSFUL PODCAST</h1>
                    <button class="header--button" type="button">
                        Enroll Now
                    </button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container--small course--section">
            <div class="course--hero">
                <h1>Learn How To Launch a Successful Podcast</h1>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                <div class="price">
                    <span class="current--price">$189</span>
                    <span class="old--price">$399</span>
                </div>
                <div class="course--button">
                    <button class="btn--primary" type="button">Enroll Now</button>
                    <button class="btn--secondary" type="button">
                        <img src="/Image/button_image.png"
                         alt="button image"
                         class="button--image"
                         width="12px"
                         height="27px"
                         loading="lazy">
                         Watch Trailer
                    </button>
                </div>
            </div>
            <img src="/Image/course__image.png"
                alt="women image"
                class="course--image"
                width="583px"
                height="490px"
                loading="lazy"
            >
        </div>
    </main>
</body>
</html>
